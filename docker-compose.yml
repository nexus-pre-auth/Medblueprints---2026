version: "3.9"

# MedBlueprints Full Stack — Local / CI compose
# For production (medblueprints.com) use docker-compose.prod.yml
#
# Services:
#   api      — FastAPI backend (all AI intelligence layers)
#   frontend — Next.js dashboard
#   db       — PostgreSQL (project + outcome dataset)
#   redis    — Job queue for async blueprint processing
#   worker   — Celery worker (requires src/worker/ — use 'celery' profile)

services:
  # ── API (FastAPI) ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: medblueprints-api:latest
    container_name: medblueprints-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://medblueprints:${POSTGRES_PASSWORD:-medblueprints}@db:5432/medblueprints
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-opus-4-6}
      - REDIS_URL=redis://redis:6379/0
      - USE_NEO4J=${USE_NEO4J:-false}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REQUIRE_API_KEY=${REQUIRE_API_KEY:-false}
      - DEMO_API_KEY=${DEMO_API_KEY:-demo-medblueprints-2026}
      - API_KEYS=${API_KEYS:-}
    volumes:
      - ./data:/app/data
      - ./src:/app/src:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Celery Worker (async blueprint analysis) ──────────────────────────
  # Requires src/worker/celery_app.py — enable with: docker compose --profile celery up
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: medblueprints-api:latest
    container_name: medblueprints-worker
    command: celery -A src.worker.celery_app worker --loglevel=info --concurrency=2
    profiles:
      - celery
    environment:
      - DATABASE_URL=postgresql+asyncpg://medblueprints:${POSTGRES_PASSWORD:-medblueprints}@db:5432/medblueprints
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./src:/app/src:ro
    depends_on:
      - db
      - redis
    restart: unless-stopped

  # ── Frontend (Next.js) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: medblueprints-frontend:latest
    container_name: medblueprints-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_APP_NAME=MedBlueprints
    depends_on:
      - api
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: medblueprints-db
    environment:
      - POSTGRES_DB=medblueprints
      - POSTGRES_USER=medblueprints
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-medblueprints}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medblueprints -d medblueprints"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (job queue) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: medblueprints-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j (Regulatory Design Graph — production) ─────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: medblueprints-neo4j
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-medblueprints}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    profiles:
      - graph  # docker compose --profile graph up

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
